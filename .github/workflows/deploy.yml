name: CI/CD Pipeline to AWS EC2

on:
  push:
    branches:
      - main  # Triggers the workflow on push to the main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and Push Backend Image
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and Push Frontend Image
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push  # Waits for the build job to finish successfully

    steps:
      - name: Checkout Code (to get docker-compose file)
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to EC2 via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/app/"
          debug: true

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          debug: true
          script: |
            cd ~/app
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
            # Log into Docker Hub on EC2 to pull private images (if applicable)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            
            # Pull the latest images
            docker-compose pull
            
            # Stop older containers and start new ones seamlessly
            docker-compose up -d --remove-orphans
            
            # Clean up old, unused dangling images to save EC2 disk space
            docker image prune -f